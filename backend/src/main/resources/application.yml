server:
  port: 8080

spring:
  application:
    name: budget-app
  datasource:
    url: jdbc:h2:file:./data/budgetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      continue-on-error: true

app:
  default-currency: USD
  pagination:
    default-page-size: 20
    max-page-size: 100

limits:
  default-warning-threshold: 80

analysis:
  min-months: 2
  overspend-threshold-percent: 10
  max-suggestions: 5

exchange:
  cache:
    ttl-hours: 10
  api:
    base-url: https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1
    timeout-seconds: 10
