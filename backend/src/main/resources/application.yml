server:
  port: 8080

spring:
  application:
    name: budget-app
  datasource:
    url: jdbc:h2:file:./data/budgetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      continue-on-error: true

app:
  default-currency: USD
  pagination:
    default-page-size: 20
    max-page-size: 100
